<style>
  #custom-real-results {
    --blue: #1879BF;
    --blue-dark: #134061;
    --border: #E4E4E4;
    --text-light: #888888;
    --r-pill: 100px;
    --r-lg: 24px;
    --sp-section: 56px;
    --sp-inner: 20px;
    font-family: 'Roboto', sans-serif;
    padding: var(--sp-section) 0;
    
    /* Cor solicitada */
    background: #B3E0CC; 
    
    /* Hack para forçar a largura total da janela ignorando o Elementor */
    width: 100vw;
    position: relative;
    left: 50%;
    transform: translateX(-50%);
  }
  
  #custom-real-results * { box-sizing: border-box; }
  
  #custom-real-results .container { 
    width: 100%; 
    max-width: 100%; 
    margin: 0; 
    padding: 0 var(--sp-inner); 
    display: block; 
  }
  
  #custom-real-results .eyebrow { 
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px; 
    text-transform: uppercase; color: var(--blue-dark); margin-bottom: 10px; display: block; 
  }
  
  #custom-real-results .section-title { 
    font-family: 'Roboto', sans-serif; font-size: clamp(26px, 7vw, 44px); 
    font-weight: 700; line-height: 1.1; letter-spacing: -0.8px; color: var(--blue-dark); margin: 0;
  }
  
  #custom-real-results .section-body { 
    font-size: 16px; line-height: 1.7; color: var(--blue-dark); margin: 0; 
  }
  
  #custom-real-results .ba-grid { 
    display: grid; gap: 20px; grid-template-columns: 1fr; margin-top: 36px; 
  }
  
  @media (min-width: 900px) { 
    #custom-real-results .ba-grid { grid-template-columns: repeat(3, 1fr); } 
    /* Padding lateral igual ao do Pricing Plans para ficar alinhado */
    #custom-real-results { --sp-section: 80px; --sp-inner: 120px; }
  }
  
  #custom-real-results .ba-card { 
    background: white; border-radius: var(--r-lg); border: 1.5px solid var(--border); 
    overflow: hidden; margin-bottom: 32px; 
  }
  
  #custom-real-results .ba-slider { 
    position: relative; aspect-ratio: 4/3; overflow: hidden; cursor: col-resize; 
    user-select: none; -webkit-user-select: none; touch-action: pan-y; 
  }
  
  #custom-real-results .ba-before-img { 
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
    display: block; pointer-events: none; 
  }
  
  #custom-real-results .ba-after-clip { 
    position: absolute; inset: 0; clip-path: inset(0 50% 0 0); will-change: clip-path; 
  }
  
  #custom-real-results .ba-after-clip img { 
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; 
    display: block; pointer-events: none; 
  }
  
  #custom-real-results .ba-divider { 
    position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); 
    width: 3px; background: white; display: flex; align-items: center; justify-content: center; 
    will-change: left; z-index: 2; pointer-events: none; 
  }
  
  #custom-real-results .ba-handle-btn { 
    width: 44px; height: 44px; border-radius: 50%; background: white; 
    box-shadow: 0 2px 12px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; 
    color: var(--blue-dark); flex-shrink: 0; 
  }
  
  #custom-real-results .ba-label { 
    position: absolute; top: 12px; font-size: 11px; font-weight: 800; letter-spacing: 0.8px; 
    text-transform: uppercase; padding: 4px 10px; border-radius: var(--r-pill); 
    pointer-events: none; z-index: 1; 
  }
  #custom-real-results .ba-label-before { left: 12px; background: rgba(0,0,0,0.55); color: white; }
  #custom-real-results .ba-label-after { right: 12px; background: var(--blue); color: white; }
  
  #custom-real-results .ba-caption { 
    display: flex; align-items: center; gap: 6px; padding: 12px 16px; 
    font-size: 13px; font-weight: 600; color: var(--text-light); 
  }
</style>

<!-- Script para arrastar o "Antes e Depois" -->
<script>
  (function() {
    function initSlider(el) {
      var afterClip    = el.querySelector('.ba-after-clip');
      var divider      = el.querySelector('.ba-divider');
      var pct          = 50;
      var dragging     = false;
      var startX       = 0;
      var startY       = 0;
      var isHorizontal = null;

      function setPos(clientX) {
        var rect = el.getBoundingClientRect();
        var raw  = (clientX - rect.left) / rect.width * 100;
        pct = Math.min(95, Math.max(5, raw));
        afterClip.style.clipPath = 'inset(0 ' + (100 - pct) + '% 0 0)';
        divider.style.left = pct + '%';
      }

      // Mouse Events
      el.addEventListener('mousedown', function(e) {
        dragging = true;
        setPos(e.clientX);
        e.preventDefault();
      });
      window.addEventListener('mousemove', function(e) {
        if (dragging) setPos(e.clientX);
      });
      window.addEventListener('mouseup', function() {
        dragging = false;
      });

      // Touch Events
      el.addEventListener('touchstart', function(e) {
        dragging     = true;
        startX       = e.touches[0].clientX;
        startY       = e.touches[0].clientY;
        isHorizontal = null;
      }, { passive: true });

      el.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        var dx = e.touches[0].clientX - startX;
        var dy = e.touches[0].clientY - startY;
        if (isHorizontal === null) {
          isHorizontal = Math.abs(dx) > Math.abs(dy);
        }
        if (isHorizontal) {
          e.preventDefault();
          setPos(e.touches[0].clientX);
        }
      }, { passive: false });

      el.addEventListener('touchend', function() {
        dragging = false;
      });
    }

    // Dá um tempinho para o Elementor carregar o DOM antes de iniciar
    setTimeout(function() {
      document.querySelectorAll('[data-ba]').forEach(initSlider);
    }, 500);
  })();
</script>
